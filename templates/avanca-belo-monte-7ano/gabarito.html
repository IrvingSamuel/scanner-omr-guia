<!doctype html>
<html lang="pt-BR">

  <title>Gabarito Matematica 7o Ano</title>
  <link rel="stylesheet" href="./gabarito.css">
</head>
<body>
  <main class="sheet">
    <section class="canvas">
      <img class="asset logo-main" src="./assets/logo_top_left.png" alt="Logo Avanca Belo Monte">
